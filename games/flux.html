<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FLUX - Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #ffffff 0%, #f6f9ff 100%); overflow: hidden;
            font-family: 'JetBrains Mono', monospace; color: #1f2937;
            user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: manipulation;
        }
        canvas { border: 2px solid #dbeafe; border-radius: 16px; box-shadow: 0 14px 42px rgba(59,130,246,0.12); background: #ffffff; }
        .back-btn { position: fixed; top: 14px; left: 18px; z-index: 20; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(31,41,55,0.55); text-decoration: none; transition: color 0.2s; }
        .back-btn:hover { color: #111827; }
    </style>
</head>
<body>
    <a href="../games.html" class="back-btn">← Arcade</a>
    <canvas id="c"></canvas>
<script>
// ================================================================
//  FLUX — Hybrid Casual Puzzle: Pipe Rotation + Flowing Energy
//  Rotate tiles to guide neon energy from sources to drains.
//  New rows push from top. Clear connected paths for points.
//  Survive as long as possible.
// ================================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Audio ---
const AudioCtor = window.AudioContext || window.webkitAudioContext;
let AC = null;
try { AC = new AudioCtor(); } catch(e) {}
const masterGain = AC ? AC.createGain() : null;
if (AC) { masterGain.gain.value = 0.45; masterGain.connect(AC.destination); }

function sfx(freq, dur, type, vol) {
    if (!AC) return;
    const t = AC.currentTime;
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol || 0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t + dur);
}

function sfxRotate() { sfx(600, 0.04, 'triangle', 0.06); }
function sfxConnect() {
    sfx(523, 0.08, 'sine', 0.1);
    setTimeout(() => sfx(784, 0.08, 'sine', 0.08), 50);
}
function sfxChain(n) {
    const base = 400 + Math.min(n, 8) * 60;
    sfx(base, 0.1, 'sine', 0.1);
    setTimeout(() => sfx(base * 1.5, 0.1, 'sine', 0.08), 60);
    setTimeout(() => sfx(base * 2, 0.12, 'sine', 0.07), 120);
}
function sfxPush() { sfx(180, 0.15, 'sawtooth', 0.06); }
function sfxGameOver() {
    sfx(300, 0.25, 'sawtooth', 0.1);
    setTimeout(() => sfx(200, 0.3, 'sawtooth', 0.08), 150);
    setTimeout(() => sfx(120, 0.4, 'sawtooth', 0.06), 350);
}
function sfxLevelUp() {
    [523, 659, 784, 1047].forEach((n, i) => setTimeout(() => sfx(n, 0.15, 'sine', 0.09), i * 70));
}
function sfxClear() {
    sfx(880, 0.06, 'sine', 0.1);
    setTimeout(() => sfx(1100, 0.08, 'sine', 0.08), 40);
}

// --- Sizing ---
const W = Math.min(window.innerWidth - 16, 420);
const H = Math.min(window.innerHeight - 16, 740);
canvas.width = W; canvas.height = H;

// --- Grid config ---
const COLS = 6;
const ROWS = 9;
const CELL = Math.floor(Math.min((W - 20) / COLS, (H - 160) / ROWS));
const GX = Math.floor((W - COLS * CELL) / 2);  // grid x offset
const GY = 100; // grid y offset

// --- Pipe types ---
// Each pipe has openings: top(0), right(1), bottom(2), left(3)
// Represented as a 4-element boolean array [T, R, B, L]
const PIPE_TYPES = [
    { id: 'straight', base: [true, false, true, false] },   // │
    { id: 'elbow',    base: [true, true, false, false] },    // ┘ (top+right)
    { id: 'tee',      base: [true, true, true, false] },     // ├
    { id: 'cross',    base: [true, true, true, true] },      // ┼
];

// Weighted pool (more straights and elbows, fewer crosses)
const PIPE_POOL = [0,0,0,1,1,1,1,2,2,3];

function rotatePipe(openings, times) {
    const o = [...openings];
    for (let i = 0; i < times; i++) {
        const last = o.pop();
        o.unshift(last);
    }
    return o;
}

function randomPipe() {
    const typeIdx = PIPE_POOL[Math.floor(Math.random() * PIPE_POOL.length)];
    const type = PIPE_TYPES[typeIdx];
    const rot = Math.floor(Math.random() * 4);
    return {
        typeId: type.id,
        openings: rotatePipe(type.base, rot),
        rotation: 0,       // visual rotation animation
        targetRot: 0,
        connected: false,
        clearing: 0,       // clear animation progress
        justPlaced: 8,     // new-row highlight frames
        energyFlow: 0,     // 0-1 energy animation
    };
}

// --- State ---
let grid = [];
let score = 0, highScore = 0;
let level = 1;
let combo = 0;
let gameOver = false;
let started = false;
let pushTimer = 0;
let pushInterval = 480; // frames between row pushes
let particles = [];
let floatingTexts = [];
let shakeTime = 0;
let flashAlpha = 0, flashColor = null;
let animatingClear = false;
let flowPaths = []; // currently energized cells
let sourceCol = -1; // which column has the source on top row

// Difficulty
const BASE_PUSH = 3600; // ~60 saniye at 60fps
const MIN_PUSH = 900;  // ~15 saniye minimum

// localStorage
function getStore(k, fb) { try { const v = localStorage.getItem(k); return v == null ? fb : v; } catch { return fb; } }
function setStore(k, v) { try { localStorage.setItem(k, v); } catch {} }
highScore = parseInt(getStore('flux_high', '0'));

// --- Grid operations ---
function initGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) {
            row.push(randomPipe());
        }
        grid.push(row);
    }
    sourceCol = Math.floor(COLS / 2);

    // Break any pre-existing connections: rotate random tiles until
    // there's no source-to-drain path at start
    let attempts = 0;
    while (attempts < 50) {
        if (!hasFullPath()) break;
        // Rotate a random tile to break the path
        const rr = Math.floor(Math.random() * ROWS);
        const cc = Math.floor(Math.random() * COLS);
        const tile = grid[rr][cc];
        const last = tile.openings.pop();
        tile.openings.unshift(last);
        attempts++;
    }
    // Reset all connection state
    for (const row of grid) for (const cell of row) {
        cell.connected = false;
        cell.energyFlow = 0;
    }
    flowPaths = [];
}

// Check if a full source-to-drain path exists (without triggering clears)
function hasFullPath() {
    const startCell = grid[0][sourceCol];
    if (!startCell || !startCell.openings[0]) return false;

    const visited = new Set();
    const queue = [{ r: 0, c: sourceCol, from: 0 }];
    const key = (r, c) => `${r},${c}`;

    while (queue.length > 0) {
        const { r, c, from } = queue.shift();
        const k = key(r, c);
        if (visited.has(k)) continue;
        const cell = grid[r][c];
        if (!cell.openings[from]) continue;
        visited.add(k);

        // Reached bottom with bottom opening?
        if (r === ROWS - 1 && cell.openings[2]) return true;

        const dirs = [
            { dr: -1, dc: 0, out: 0, neighborIn: 2 },
            { dr: 0, dc: 1, out: 1, neighborIn: 3 },
            { dr: 1, dc: 0, out: 2, neighborIn: 0 },
            { dr: 0, dc: -1, out: 3, neighborIn: 1 },
        ];
        for (const d of dirs) {
            if (!cell.openings[d.out]) continue;
            const nr = r + d.dr, nc = c + d.dc;
            if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
            if (visited.has(key(nr, nc))) continue;
            queue.push({ r: nr, c: nc, from: d.neighborIn });
        }
    }
    return false;
}

function pushRow() {
    // Check if top row has any important connections — game over if grid full
    if (grid.length >= ROWS) {
        // Remove bottom row
        const removed = grid.pop();
        // Check if drain was connected
    }
    // Add new row at top
    const row = [];
    for (let c = 0; c < COLS; c++) {
        row.push(randomPipe());
    }
    grid.unshift(row);

    // Re-randomize source position occasionally
    if (Math.random() < 0.3) {
        sourceCol = Math.floor(Math.random() * COLS);
    }

    sfxPush();
    shakeTime = 4;

    // Check overflow: if any cell in bottom row is "blocked" after push — game over check
    // Actually: game over when grid overflows (more rows than ROWS)
    // We keep grid at ROWS, so game over when energy can't reach bottom
    // Better: game over when a new row is pushed and the bottom row had active connections being removed
}

function rotateTile(r, c) {
    if (r < 0 || r >= grid.length || c < 0 || c >= COLS) return;
    const tile = grid[r][c];
    if (tile.clearing > 0) return;

    // Rotate openings: shift right by 1
    const last = tile.openings.pop();
    tile.openings.unshift(last);
    tile.targetRot += 90;

    sfxRotate();
    recalcFlow();
}

// --- Flow calculation ---
// BFS from source (top of sourceCol) through connected pipes to bottom
function recalcFlow() {
    // Reset
    for (const row of grid) for (const cell of row) {
        cell.connected = false;
        cell.energyFlow = 0;
    }
    flowPaths = [];

    if (grid.length === 0) return;

    // Source enters from top of sourceCol, row 0
    const startCell = grid[0][sourceCol];
    if (!startCell || !startCell.openings[0]) return; // needs top opening to receive

    // BFS
    const queue = [{ r: 0, c: sourceCol, from: 0 }]; // from: direction we entered (0=top)
    const visited = new Set();
    const key = (r, c) => `${r},${c}`;

    while (queue.length > 0) {
        const { r, c, from } = queue.shift();
        const k = key(r, c);
        if (visited.has(k)) continue;
        visited.add(k);

        const cell = grid[r][c];
        // Check if this cell has opening on the 'from' side
        if (!cell.openings[from]) continue;

        cell.connected = true;
        cell.energyFlow = 1;
        flowPaths.push({ r, c });

        // Explore neighbors through other openings
        const dirs = [
            { dr: -1, dc: 0, out: 0, neighborIn: 2 }, // top
            { dr: 0, dc: 1,  out: 1, neighborIn: 3 }, // right
            { dr: 1, dc: 0,  out: 2, neighborIn: 0 }, // bottom
            { dr: 0, dc: -1, out: 3, neighborIn: 1 }, // left
        ];

        for (const d of dirs) {
            if (!cell.openings[d.out]) continue; // no opening in this direction
            const nr = r + d.dr;
            const nc = c + d.dc;
            if (nr < 0 || nr >= grid.length || nc < 0 || nc >= COLS) continue;
            if (visited.has(key(nr, nc))) continue;
            queue.push({ r: nr, c: nc, from: d.neighborIn });
        }
    }

    // Check if flow reaches bottom row
    let reachedBottom = false;
    for (let c = 0; c < COLS; c++) {
        if (grid.length > 0 && grid[grid.length - 1][c].connected && grid[grid.length - 1][c].openings[2]) {
            reachedBottom = true;
        }
    }

    if (reachedBottom && flowPaths.length >= 3) {
        // Score! Clear connected path
        triggerClear();
    }
}

let clearCooldown = 0; // prevent rapid re-clears

function triggerClear() {
    if (clearCooldown > 0) return; // already cleared recently, wait for animation
    clearCooldown = 30; // ~0.5s cooldown

    combo++;
    const pathLen = flowPaths.length;
    const points = pathLen + combo * 2; // balanced: ~10-20 pts per clear
    score += points;

    if (score > highScore) {
        highScore = score;
        setStore('flux_high', String(highScore));
    }

    // Level up every 50 points (balanced with new scoring)
    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel > level) {
        // Only advance 1 level at a time
        level++;
        sfxLevelUp();
        flashColor = '#34d399'; flashAlpha = 0.20;
        floatText(W / 2, GY - 20, `LEVEL ${level}`, '#10b981', 16);
        pushInterval = Math.max(MIN_PUSH, Math.round(BASE_PUSH - (level - 1) * 180));
    }

    sfxChain(combo);

    // Reward: reset push timer (player earned breathing room)
    pushTimer = 0;

    // Mark cells for clearing animation
    animatingClear = true;
    for (const { r, c } of flowPaths) {
        grid[r][c].clearing = 1;
    }

    floatText(W / 2, GY + ROWS * CELL / 2, `+${points}`, '#00e5ff', 14);
    if (combo >= 2) {
        floatText(W / 2, GY + ROWS * CELL / 2 - 25, `${combo}x CHAIN`, '#ffaa33', 12);
    }

    // Particles along path
    for (const { r, c } of flowPaths) {
        const cx = GX + c * CELL + CELL / 2;
        const cy = GY + r * CELL + CELL / 2;
        spawnParticles(cx, cy, '#00e5ff', 4);
    }

    flashColor = '#00e5ff'; flashAlpha = 0.15;
    sfxClear();
}

function finishClear() {
    animatingClear = false;
    // Replace ALL cells with fresh random pipes (full board reset)
    for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = randomPipe();
        }
    }
    // Randomize source position
    sourceCol = Math.floor(Math.random() * COLS);
    // Break any accidental pre-connections
    let attempts = 0;
    while (attempts < 50 && hasFullPath()) {
        const rr = Math.floor(Math.random() * ROWS);
        const cc = Math.floor(Math.random() * COLS);
        const tile = grid[rr][cc];
        const last = tile.openings.pop();
        tile.openings.unshift(last);
        attempts++;
    }
    // Reset flow state
    for (const row of grid) for (const cell of row) { cell.connected = false; cell.energyFlow = 0; }
    flowPaths = [];
}

// --- Particles ---
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 1 + Math.random() * 3;
        particles.push({
            x, y,
            dx: Math.cos(a) * spd, dy: Math.sin(a) * spd,
            life: 1, decay: 0.025 + Math.random() * 0.02,
            size: 2 + Math.random() * 3, color
        });
    }
}

function floatText(x, y, text, color, size) {
    if (floatingTexts.length > 5) floatingTexts.shift();
    floatingTexts.push({ x, y, text, color, size: size || 14, life: 1, dy: -1.5 });
}

// --- Input ---
function handleTap(px, py) {
    if (AC && AC.state === 'suspended') AC.resume();
    if (gameOver) { restart(); return; }
    if (!started) { started = true; recalcFlow(); return; }

    // Find which cell was tapped
    const gc = Math.floor((px - GX) / CELL);
    const gr = Math.floor((py - GY) / CELL);
    if (gc >= 0 && gc < COLS && gr >= 0 && gr < grid.length) {
        rotateTile(gr, gc);
    }
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    handleTap(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    handleTap(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

document.addEventListener('keydown', (e) => {
    if (e.key === ' ' && gameOver) restart();
});

// --- Game logic ---
function restart() {
    score = 0; combo = 0; level = 1; gameOver = false; started = false;
    pushTimer = 0; pushInterval = BASE_PUSH;
    particles = []; floatingTexts = []; flowPaths = [];
    shakeTime = 0; flashAlpha = 0; animatingClear = false;
    initGrid();
}

function update() {
    if (!started || gameOver) return;

    // Clear animation
    if (animatingClear) {
        let allDone = true;
        for (const row of grid) {
            for (const cell of row) {
                if (cell.clearing > 0) {
                    cell.clearing -= 0.04;
                    if (cell.clearing > 0) allDone = false;
                }
            }
        }
        if (allDone) finishClear();
        return; // pause game during clear animation
    }

    // Push timer
    pushTimer++;
    if (pushTimer >= pushInterval) {
        pushTimer = 0;
        combo = 0; // reset combo on push
        pushRow();
        // Reset flow display but don't auto-trigger clears from push
        for (const row of grid) for (const cell of row) { cell.connected = false; cell.energyFlow = 0; }
        flowPaths = [];
        checkGameOver();
    }

    // justPlaced decay
    for (const row of grid) {
        for (const cell of row) {
            if (cell.justPlaced > 0) cell.justPlaced--;
        }
    }

    // Rotation animation
    for (const row of grid) {
        for (const cell of row) {
            if (cell.rotation !== cell.targetRot) {
                const diff = cell.targetRot - cell.rotation;
                cell.rotation += diff * 0.3;
                if (Math.abs(diff) < 1) cell.rotation = cell.targetRot;
            }
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx; p.y += p.dy;
        p.life -= p.decay;
        p.dx *= 0.96; p.dy *= 0.96;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.y += t.dy;
        t.life -= 0.02;
        if (t.life <= 0) floatingTexts.splice(i, 1);
    }

    if (shakeTime > 0) shakeTime--;
    if (flashAlpha > 0) flashAlpha -= 0.012;
    if (clearCooldown > 0) clearCooldown--;
}

function checkGameOver() {
    if (gameOver) return;
    pushesWithoutClear++;
    if (pushesWithoutClear >= 8) {
        gameOver = true;
        sfxGameOver();
        shakeTime = 20;
        flashColor = '#fb7185'; flashAlpha = 0.25;
        if (score > highScore) {
            highScore = score;
            setStore('flux_high', String(highScore));
        }
    }
}

let pushesWithoutClear = 0;

// Override triggerClear to reset pushesWithoutClear
const _origTriggerClear = triggerClear;
// Actually just add to triggerClear — let me refactor:
// We'll track it inline. Let me patch:

// Monkey-patch: reset counter on clear
const origTriggerClear = triggerClear;
// Hmm, triggerClear is already defined. Let me just set the flag inside it.
// I'll use a simpler approach — set flag in recalcFlow when clear happens.

// Actually let me just add it properly:
function resetClearCounter() { pushesWithoutClear = 0; }

// --- Drawing ---
const ENERGY_COLOR = '#2563eb';
const ENERGY_GLOW = 'rgba(37,99,235,0.22)';
const PIPE_COLOR = '#93c5fd';
const PIPE_CONNECTED = '#f97316';
const BG_CELL = '#eff6ff';

function drawPipeSegment(cx, cy, openings, connected, clearing, justPlaced, energyPulse) {
    const half = CELL / 2;
    const pipeW = 8;

    const baseColor = connected ? PIPE_CONNECTED : 'rgba(37,99,235,0.35)';
    const alpha = clearing > 0 ? clearing : 1;

    ctx.globalAlpha = alpha;

    // Glow for connected
    if (connected && clearing <= 0) {
        ctx.shadowColor = ENERGY_GLOW;
        ctx.shadowBlur = 12;
    }

    ctx.strokeStyle = baseColor;
    ctx.lineWidth = pipeW;
    ctx.lineCap = 'round';

    // Draw pipe segments from center to each open side
    if (openings[0]) { // top
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - half); ctx.stroke();
    }
    if (openings[1]) { // right
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + half, cy); ctx.stroke();
    }
    if (openings[2]) { // bottom
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + half); ctx.stroke();
    }
    if (openings[3]) { // left
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - half, cy); ctx.stroke();
    }

    ctx.shadowBlur = 0;

    // Center node
    ctx.fillStyle = connected ? PIPE_CONNECTED : 'rgba(59,130,246,0.45)';
    ctx.beginPath();
    ctx.arc(cx, cy, pipeW / 2 + 1, 0, Math.PI * 2);
    ctx.fill();

    // Energy pulse dot for connected
    if (connected && clearing <= 0) {
        const pulse = 0.5 + Math.sin(Date.now() * 0.006 + cx * 0.1 + cy * 0.1) * 0.5;
        ctx.globalAlpha = pulse * 0.6;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx, cy, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // New-row glow
    if (justPlaced > 0) {
        ctx.globalAlpha = justPlaced / 8 * 0.2;
        ctx.fillStyle = '#44ffaa';
        ctx.fillRect(cx - half, cy - half, CELL, CELL);
    }

    ctx.globalAlpha = 1;
}

function draw() {
    ctx.save();

    if (shakeTime > 0) {
        const i = shakeTime * 0.6;
        ctx.translate((Math.random() - 0.5) * i, (Math.random() - 0.5) * i);
    }

    // Background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#ffffff');
    bgGrad.addColorStop(1, '#f8fbff');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Grid background
    ctx.fillStyle = '#f1f5ff';
    ctx.fillRect(GX, GY, COLS * CELL, ROWS * CELL);

    // Grid lines
    ctx.strokeStyle = 'rgba(37,99,235,0.15)';
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(GX + c * CELL, GY); ctx.lineTo(GX + c * CELL, GY + ROWS * CELL); ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(GX, GY + r * CELL); ctx.lineTo(GX + COLS * CELL, GY + r * CELL); ctx.stroke();
    }

    // Source indicator (top)
    const srcX = GX + sourceCol * CELL + CELL / 2;
    const srcY = GY - 8;
    ctx.fillStyle = ENERGY_COLOR;
    ctx.shadowColor = ENERGY_GLOW;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(srcX - 8, srcY - 10);
    ctx.lineTo(srcX + 8, srcY - 10);
    ctx.lineTo(srcX, srcY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Energy beam from source
    const pulse = 0.6 + Math.sin(Date.now() * 0.005) * 0.4;
    ctx.strokeStyle = ENERGY_COLOR;
    ctx.globalAlpha = pulse * 0.5;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(srcX, srcY);
    ctx.lineTo(srcX, GY);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Drain indicator (bottom)
    ctx.fillStyle = 'rgba(30,64,175,0.28)';
    const drainY = GY + ROWS * CELL;
    for (let c = 0; c < COLS; c++) {
        const dx = GX + c * CELL + CELL / 2;
        ctx.beginPath();
        ctx.moveTo(dx - 6, drainY + 12);
        ctx.lineTo(dx + 6, drainY + 12);
        ctx.lineTo(dx, drainY + 2);
        ctx.closePath();
        ctx.fill();
    }

    // Draw cells
    for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = grid[r][c];
            const cx = GX + c * CELL + CELL / 2;
            const cy = GY + r * CELL + CELL / 2;
            drawPipeSegment(cx, cy, cell.openings, cell.connected, cell.clearing, cell.justPlaced, 0);
        }
    }

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Floating texts
    for (const t of floatingTexts) {
        ctx.globalAlpha = t.life;
        ctx.fillStyle = t.color;
        ctx.font = `bold ${t.size}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;

    // Flash
    if (flashAlpha > 0 && flashColor) {
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = flashColor;
        ctx.fillRect(-10, -10, W + 20, H + 20);
        ctx.globalAlpha = 1;
    }

    // HUD
    ctx.textAlign = 'center';

    // Score
    ctx.fillStyle = '#0f172a';
    ctx.font = "bold 20px 'Press Start 2P', monospace";
    ctx.fillText(String(score), W / 2, 38);

    // High score + Level
    ctx.fillStyle = 'rgba(30,41,59,0.55)';
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.fillText(`BEST ${highScore}`, W / 2, 56);

    ctx.fillStyle = '#10b981';
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.textAlign = 'right';
    ctx.fillText(`LV ${level}`, W - 16, 38);

    // Push timer bar
    if (started && !gameOver) {
        const barW = COLS * CELL;
        const barH = 3;
        const barY = GY - 3;
        const progress = pushTimer / pushInterval;
        ctx.fillStyle = 'rgba(30,41,59,0.12)';
        ctx.fillRect(GX, barY, barW, barH);

        const barColor = progress > 0.8 ? '#ef4444' : progress > 0.5 ? '#f59e0b' : '#3b82f6';
        ctx.fillStyle = barColor;
        ctx.fillRect(GX, barY, barW * progress, barH);
    }

    // Bottom hint
    if (started && !gameOver) {
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(30,41,59,0.4)';
        ctx.font = "8px 'JetBrains Mono', monospace";
        ctx.fillText('Tap tiles to rotate • Connect source to drain', W / 2, H - 12);
    }

    // Start screen
    if (!started && !gameOver) {
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.fillRect(0, 0, W, H);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#2563eb';
        ctx.font = "bold 32px 'Press Start 2P', monospace";
        ctx.shadowColor = 'rgba(37,99,235,0.25)';
        ctx.shadowBlur = 20;
        ctx.fillText('FLUX', W / 2, H * 0.3);
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(15,23,42,0.68)';
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText('ROTATE PIPES', W / 2, H * 0.3 + 35);
        ctx.fillText('CONNECT SOURCE → DRAIN', W / 2, H * 0.3 + 55);
        ctx.fillText('CLEAR PATHS FOR POINTS', W / 2, H * 0.3 + 75);

        // Animated pipe hint
        const t = Date.now() * 0.001;
        for (let i = 0; i < 3; i++) {
            ctx.strokeStyle = ENERGY_COLOR;
            ctx.lineWidth = 4;
            ctx.globalAlpha = 0.2 + Math.sin(t + i * 1.2) * 0.15;
            const hx = W / 2 - 40 + i * 40;
            const hy = H * 0.5;
            ctx.beginPath();
            ctx.arc(hx, hy, 12, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = 'rgba(15,23,42,0.55)';
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText('TAP TO START', W / 2, H * 0.68);
    }

    // Game over
    if (gameOver) {
        ctx.fillStyle = 'rgba(255,255,255,0.86)';
        ctx.fillRect(0, 0, W, H);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#ef4444';
        ctx.font = "bold 18px 'Press Start 2P', monospace";
        ctx.shadowColor = 'rgba(239,68,68,0.2)';
        ctx.shadowBlur = 15;
        ctx.fillText('GAME OVER', W / 2, H * 0.3);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#0f172a';
        ctx.font = "bold 26px 'Press Start 2P', monospace";
        ctx.fillText(String(score), W / 2, H * 0.4);

        ctx.fillStyle = 'rgba(15,23,42,0.62)';
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText(`BEST: ${highScore}`, W / 2, H * 0.46);
        ctx.fillText(`LEVEL: ${level}`, W / 2, H * 0.51);

        ctx.fillStyle = 'rgba(15,23,42,0.55)';
        ctx.fillText('TAP TO RETRY', W / 2, H * 0.63);
    }

    ctx.restore();
}

// --- Patch triggerClear to reset push counter ---
const _origTC = triggerClear;
// Can't easily monkey-patch a function declaration. Let's use the flag inline.
// Already handled: we call resetClearCounter in recalcFlow when reachedBottom is true.

// Let me restructure slightly: call resetClearCounter inside the flow check
// We already have triggerClear() that gets called. Let me add the reset there.
// Since triggerClear is a function declaration, I'll just add the call.

// PATCH: Override via wrapper — not ideal but works for single file
const __tc = window.__fluxClearHook = function() { pushesWithoutClear = 0; };

// Actually the simplest: just add it in the recalcFlow reachedBottom block.
// Let me fix recalcFlow to include it.

// --- Fix: Inline the counter reset ---
// recalcFlow already calls triggerClear(). Let me modify triggerClear to include it.
// Since JS hoists function declarations, the version above is the one that runs.
// The pushesWithoutClear = 0 needs to be IN triggerClear.
// Let me use a simpler approach: a post-clear hook.

// We'll check in the update loop: if score changed after recalcFlow, reset counter.
let prevScore = 0;

// --- Main Loop ---
function loop() {
    // Check if clear happened
    if (score !== prevScore) {
        pushesWithoutClear = 0;
        prevScore = score;
    }

    update();
    draw();
    requestAnimationFrame(loop);
}

restart();
prevScore = 0;
pushesWithoutClear = 0;
loop();

</script>
