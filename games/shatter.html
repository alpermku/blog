<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shatter - Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#05050a;overflow:hidden;font-family:'JetBrains Mono',monospace;color:#fff;user-select:none;display:flex;justify-content:center;align-items:center;height:100vh;touch-action:none}
        canvas{display:block;box-shadow:0 0 50px rgba(255,50,100,0.1)}
        .back-btn{position:fixed;top:14px;left:18px;z-index:100;font-family:'JetBrains Mono',monospace;font-size:13px;color:rgba(255,255,255,0.3);text-decoration:none;transition:color .2s}
        .back-btn:hover{color:#fff}
    </style>
</head>
<body>
    <a href="../games.html" class="back-btn">← Arcade</a>
    <canvas id="c"></canvas>
<script>
// ============================================================
//  S H A T T E R  —  Neon Brick Breaker
//  Chain reactions, power-ups, screen shake, combo system,
//  dynamic difficulty, particle explosions.
// ============================================================

const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H, SCALE;

function resize() {
    W = C.width = window.innerWidth;
    H = C.height = window.innerHeight;
    SCALE = Math.min(W / 400, H / 700, 1.8);
}
resize();
window.addEventListener('resize', resize);

// ======================== STORAGE ========================
const STORE_KEY = 'shatter_save';
function loadSave() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
}
function save(data) {
    localStorage.setItem(STORE_KEY, JSON.stringify({...loadSave(), ...data}));
}
let bestScore = loadSave().bestScore || 0;
let bestLevel = loadSave().bestLevel || 0;

// ======================== COLORS ========================
const NEON = ['#ff3366','#00e5ff','#ffdd00','#00ff88','#ff6600','#cc44ff','#ff0044','#44ffcc'];
const BG = '#05050a';

// ======================== GAME STATE ========================
let state = 'menu'; // menu, play, gameover, levelup
let level = 1;
let score = 0;
let combo = 0;
let maxCombo = 0;
let comboTimer = 0;
let lives = 3;
let balls = [];
let paddle = { x: 0, y: 0, w: 70, h: 10, targetX: 0 };
let bricks = [];
let particles = [];
let powerups = [];
let texts = [];
let shakeX = 0, shakeY = 0, shakeMag = 0;
let slowMo = 1;
let slowTimer = 0;
let stickyBall = true;
let launchAngle = -Math.PI / 2;
let frameCount = 0;
let levelTransTimer = 0;
let starRating = 0;

// ======================== AUDIO (Synth) ========================
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur = 0.08, vol = 0.15, type = 'square') {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}
function sfxHit() { playTone(440 + combo * 30, 0.06, 0.12); }
function sfxBreak() { playTone(660 + Math.random() * 200, 0.12, 0.15); }
function sfxCombo() { playTone(880 + combo * 50, 0.15, 0.2, 'sine'); }
function sfxPowerup() { playTone(1200, 0.2, 0.18, 'sine'); playTone(1500, 0.3, 0.12, 'sine'); }
function sfxLose() { playTone(150, 0.4, 0.2, 'sawtooth'); }
function sfxLevelUp() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 0.15, 'sine'), i * 100)); }

// ======================== PARTICLES ========================
function spawnParticles(x, y, color, count = 12, speed = 3) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * speed + 1;
        particles.push({
            x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            life: 1, decay: 0.015 + Math.random() * 0.02,
            r: 2 + Math.random() * 3, color,
            trail: Math.random() > 0.5
        });
    }
}

function spawnText(x, y, text, color = '#fff', size = 14) {
    texts.push({ x, y, text, color, size, life: 1, vy: -1.5 });
}

// ======================== POWER-UPS ========================
const PU_TYPES = [
    { id: 'multi', label: 'MULTI', color: '#00e5ff', prob: 0.25 },
    { id: 'wide', label: 'WIDE', color: '#00ff88', prob: 0.2 },
    { id: 'fire', label: 'FIRE', color: '#ff6600', prob: 0.15 },
    { id: 'slow', label: 'SLOW', color: '#ffdd00', prob: 0.15 },
    { id: 'life', label: '+1', color: '#ff3366', prob: 0.08 },
];

function maybeDropPowerup(x, y) {
    if (Math.random() > 0.18) return;
    let roll = Math.random(), acc = 0;
    for (const pu of PU_TYPES) {
        acc += pu.prob;
        if (roll < acc) {
            powerups.push({ x, y, vy: 1.5 + Math.random(), type: pu, r: 10, life: 1 });
            return;
        }
    }
}

function applyPowerup(pu) {
    sfxPowerup();
    spawnParticles(pu.x, pu.y, pu.type.color, 20, 4);
    spawnText(pu.x, pu.y - 15, pu.type.label, pu.type.color, 16);

    switch (pu.type.id) {
        case 'multi':
            const orig = balls[0] || { x: paddle.x, y: paddle.y - 10, r: 5, speed: 4 + level * 0.3, color: '#fff', fire: false };
            for (let i = 0; i < 2; i++) {
                const a = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
                balls.push({
                    x: orig.x, y: orig.y, r: orig.r,
                    vx: Math.cos(a) * orig.speed, vy: Math.sin(a) * orig.speed,
                    speed: orig.speed, color: '#00e5ff', fire: orig.fire, trail: []
                });
            }
            break;
        case 'wide':
            paddle.w = Math.min(paddle.w + 25, 150);
            setTimeout(() => { paddle.w = Math.max(paddle.w - 25, 50); }, 8000);
            break;
        case 'fire':
            balls.forEach(b => { b.fire = true; b.color = '#ff6600'; });
            setTimeout(() => balls.forEach(b => { b.fire = false; b.color = '#fff'; }), 6000);
            break;
        case 'slow':
            slowMo = 0.5;
            slowTimer = 300;
            break;
        case 'life':
            lives = Math.min(lives + 1, 5);
            break;
    }
}

// ======================== BRICKS ========================
function generateBricks() {
    bricks = [];
    const cols = Math.min(7 + Math.floor(level / 3), 10);
    const rows = Math.min(3 + Math.floor(level / 2), 8);
    const bw = (W * 0.85) / cols;
    const bh = Math.min(22 * SCALE, 28);
    const startX = (W - cols * bw) / 2;
    const startY = 50 + (level > 5 ? 20 : 0);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            // Pattern variety per level
            if (level % 3 === 0 && (r + c) % 3 === 0) continue; // gaps
            if (level % 4 === 0 && r === Math.floor(rows / 2) && c > 1 && c < cols - 2) continue; // corridor
            if (level % 5 === 0 && Math.abs(c - cols / 2) + Math.abs(r - rows / 2) > (rows + cols) / 3) continue; // diamond

            let hp = 1;
            if (r < 2 && level > 2) hp = 2;
            if (r === 0 && level > 5) hp = 3;
            if (level > 8 && Math.random() < 0.1) hp = 4; // steel bricks

            const color = NEON[(r * 2 + c + level) % NEON.length];
            bricks.push({
                x: startX + c * bw + 2,
                y: startY + r * (bh + 3) + 2,
                w: bw - 4, h: bh - 2,
                hp, maxHp: hp, color,
                flash: 0
            });
        }
    }
}

// ======================== BALL ========================
function createBall() {
    const speed = 4 + level * 0.3;
    return {
        x: paddle.x, y: paddle.y - paddle.h - 6,
        vx: 0, vy: -speed,
        r: 5, speed, color: '#fff', fire: false,
        trail: []
    };
}

// ======================== LEVEL ========================
function startLevel() {
    generateBricks();
    balls = [createBall()];
    powerups = [];
    particles = [];
    texts = [];
    stickyBall = true;
    paddle.w = 70;
    slowMo = 1;
    combo = 0;
    comboTimer = 0;
}

function initGame() {
    level = 1;
    score = 0;
    lives = 3;
    maxCombo = 0;
    paddle.x = W / 2;
    paddle.y = H - 60;
    startLevel();
    state = 'play';
}

// ======================== SCREEN SHAKE ========================
function shake(mag = 5) {
    shakeMag = Math.max(shakeMag, mag);
}

function updateShake() {
    if (shakeMag > 0.5) {
        shakeX = (Math.random() - 0.5) * shakeMag * 2;
        shakeY = (Math.random() - 0.5) * shakeMag * 2;
        shakeMag *= 0.85;
    } else {
        shakeX = shakeY = shakeMag = 0;
    }
}

// ======================== INPUT ========================
let inputX = W / 2;
let touching = false;

function handleInput(x) {
    inputX = x;
    if (state === 'play') {
        paddle.targetX = x;
    }
}

C.addEventListener('mousemove', e => handleInput(e.clientX));
C.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e.touches[0].clientX); }, { passive: false });

function handleTap(x, y) {
    initAudio();
    if (state === 'menu') {
        initGame();
        return;
    }
    if (state === 'gameover') {
        state = 'menu';
        return;
    }
    if (state === 'levelup') {
        level++;
        startLevel();
        state = 'play';
        return;
    }
    if (state === 'play' && stickyBall) {
        stickyBall = false;
        const a = launchAngle;
        balls[0].vx = Math.cos(a) * balls[0].speed;
        balls[0].vy = Math.sin(a) * balls[0].speed;
        sfxHit();
    }
}

C.addEventListener('click', e => handleTap(e.clientX, e.clientY));
C.addEventListener('touchstart', e => {
    e.preventDefault();
    touching = true;
    handleInput(e.touches[0].clientX);
    handleTap(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
C.addEventListener('touchend', () => { touching = false; });

// ======================== UPDATE ========================
function update() {
    frameCount++;
    updateShake();

    if (slowTimer > 0) {
        slowTimer--;
        if (slowTimer <= 0) slowMo = 1;
    }

    if (state !== 'play') return;

    // Combo decay
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) combo = 0;
    }

    // Paddle
    paddle.x += (paddle.targetX - paddle.x) * 0.2;
    paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));
    paddle.y = H - 60;

    // Sticky ball aim
    if (stickyBall && balls.length > 0) {
        launchAngle = -Math.PI / 2 + Math.sin(frameCount * 0.03) * 0.6;
        balls[0].x = paddle.x;
        balls[0].y = paddle.y - paddle.h - balls[0].r;
        return;
    }

    // Balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
        const b = balls[bi];
        const dt = slowMo;

        // Trail
        b.trail.push({ x: b.x, y: b.y, life: 1 });
        if (b.trail.length > 12) b.trail.shift();
        b.trail.forEach(t => t.life -= 0.08);

        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // Wall bounce
        if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); sfxHit(); }
        if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); sfxHit(); }
        if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); sfxHit(); }

        // Bottom - lose ball
        if (b.y > H + 20) {
            balls.splice(bi, 1);
            if (balls.length === 0) {
                lives--;
                sfxLose();
                shake(12);
                combo = 0;
                if (lives <= 0) {
                    state = 'gameover';
                    if (score > bestScore) { bestScore = score; save({ bestScore }); }
                    if (level > bestLevel) { bestLevel = level; save({ bestLevel }); }
                } else {
                    balls = [createBall()];
                    stickyBall = true;
                }
            }
            continue;
        }

        // Paddle collision
        if (b.vy > 0 &&
            b.y + b.r >= paddle.y - paddle.h / 2 &&
            b.y + b.r <= paddle.y + paddle.h / 2 + 8 &&
            b.x >= paddle.x - paddle.w / 2 - b.r &&
            b.x <= paddle.x + paddle.w / 2 + b.r) {

            const hitPos = (b.x - paddle.x) / (paddle.w / 2); // -1 to 1
            const angle = -Math.PI / 2 + hitPos * Math.PI / 3; // -150° to -30°
            const spd = b.speed;
            b.vx = Math.cos(angle) * spd;
            b.vy = Math.sin(angle) * spd;
            b.y = paddle.y - paddle.h / 2 - b.r;
            sfxHit();
            spawnParticles(b.x, b.y, '#fff', 4, 2);
        }

        // Brick collision
        for (let i = bricks.length - 1; i >= 0; i--) {
            const br = bricks[i];
            if (b.x + b.r > br.x && b.x - b.r < br.x + br.w &&
                b.y + b.r > br.y && b.y - b.r < br.y + br.h) {

                // Determine bounce side
                if (!b.fire) {
                    const overlapL = (b.x + b.r) - br.x;
                    const overlapR = (br.x + br.w) - (b.x - b.r);
                    const overlapT = (b.y + b.r) - br.y;
                    const overlapB = (br.y + br.h) - (b.y - b.r);
                    const minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB);
                    if (minOverlap === overlapT || minOverlap === overlapB) b.vy = -b.vy;
                    else b.vx = -b.vx;
                }

                br.hp--;
                br.flash = 1;
                sfxBreak();

                if (br.hp <= 0) {
                    // Brick destroyed
                    combo++;
                    comboTimer = 90;
                    maxCombo = Math.max(maxCombo, combo);

                    const pts = 10 * (1 + Math.floor(combo / 3)) * br.maxHp;
                    score += pts;

                    spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 15 + combo * 2, 4);
                    spawnText(br.x + br.w / 2, br.y, '+' + pts, br.color);

                    if (combo > 1 && combo % 3 === 0) {
                        sfxCombo();
                        spawnText(W / 2, H / 2, combo + 'x COMBO!', '#ffdd00', 22);
                        shake(3 + combo);
                    }

                    maybeDropPowerup(br.x + br.w / 2, br.y + br.h / 2);
                    bricks.splice(i, 1);
                } else {
                    shake(2);
                    spawnParticles(b.x, b.y, br.color, 5, 2);
                }

                if (!b.fire) break; // Fire ball pierces through
            }
        }
    }

    // Power-ups
    for (let i = powerups.length - 1; i >= 0; i--) {
        const pu = powerups[i];
        pu.y += pu.vy;
        if (pu.y > H + 20) { powerups.splice(i, 1); continue; }

        // Paddle catch
        if (pu.y + pu.r >= paddle.y - paddle.h / 2 &&
            pu.x >= paddle.x - paddle.w / 2 - pu.r &&
            pu.x <= paddle.x + paddle.w / 2 + pu.r) {
            applyPowerup(pu);
            powerups.splice(i, 1);
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05; // gravity
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Texts
    for (let i = texts.length - 1; i >= 0; i--) {
        const t = texts[i];
        t.y += t.vy;
        t.life -= 0.02;
        if (t.life <= 0) texts.splice(i, 1);
    }

    // Level complete
    if (bricks.length === 0 && state === 'play') {
        state = 'levelup';
        sfxLevelUp();
        // Star rating
        starRating = lives >= 3 ? 3 : lives >= 2 ? 2 : 1;
        if (maxCombo >= 10) starRating = Math.min(starRating + 1, 3);
        if (level > bestLevel) { bestLevel = level; save({ bestLevel }); }
        if (score > bestScore) { bestScore = score; save({ bestScore }); }
    }
}

// ======================== DRAW ========================
function drawGlow(x, y, r, color, alpha = 0.3) {
    const grad = X.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, color + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
    grad.addColorStop(1, 'transparent');
    X.fillStyle = grad;
    X.fillRect(x - r, y - r, r * 2, r * 2);
}

function draw() {
    X.save();
    X.translate(shakeX, shakeY);

    // Background
    X.fillStyle = BG;
    X.fillRect(-10, -10, W + 20, H + 20);

    // Grid effect
    X.strokeStyle = 'rgba(255,255,255,0.02)';
    X.lineWidth = 1;
    for (let gy = 0; gy < H; gy += 40) {
        X.beginPath(); X.moveTo(0, gy); X.lineTo(W, gy); X.stroke();
    }
    for (let gx = 0; gx < W; gx += 40) {
        X.beginPath(); X.moveTo(gx, 0); X.lineTo(gx, H); X.stroke();
    }

    if (state === 'menu') {
        drawMenu();
        X.restore();
        return;
    }

    // Bricks
    for (const br of bricks) {
        const alpha = br.hp / br.maxHp;
        X.fillStyle = br.color;
        X.globalAlpha = 0.3 + alpha * 0.7;

        // Brick body
        X.beginPath();
        const rr = 3;
        X.moveTo(br.x + rr, br.y);
        X.lineTo(br.x + br.w - rr, br.y);
        X.quadraticCurveTo(br.x + br.w, br.y, br.x + br.w, br.y + rr);
        X.lineTo(br.x + br.w, br.y + br.h - rr);
        X.quadraticCurveTo(br.x + br.w, br.y + br.h, br.x + br.w - rr, br.y + br.h);
        X.lineTo(br.x + rr, br.y + br.h);
        X.quadraticCurveTo(br.x, br.y + br.h, br.x, br.y + br.h - rr);
        X.lineTo(br.x, br.y + rr);
        X.quadraticCurveTo(br.x, br.y, br.x + rr, br.y);
        X.fill();

        // Flash on hit
        if (br.flash > 0) {
            X.fillStyle = '#fff';
            X.globalAlpha = br.flash * 0.6;
            X.fill();
            br.flash -= 0.1;
        }

        // HP indicator for multi-hp bricks
        if (br.maxHp > 1) {
            X.globalAlpha = 0.8;
            X.fillStyle = '#fff';
            X.font = '9px JetBrains Mono';
            X.textAlign = 'center';
            X.fillText(br.hp, br.x + br.w / 2, br.y + br.h / 2 + 3);
        }

        X.globalAlpha = 1;
    }

    // Particles
    for (const p of particles) {
        X.globalAlpha = p.life;
        X.fillStyle = p.color;
        if (p.trail) {
            X.beginPath();
            X.moveTo(p.x, p.y);
            X.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
            X.strokeStyle = p.color;
            X.lineWidth = p.r * 0.7;
            X.stroke();
        }
        X.beginPath();
        X.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        X.fill();
    }
    X.globalAlpha = 1;

    // Power-ups
    for (const pu of powerups) {
        const pulse = 1 + Math.sin(frameCount * 0.1) * 0.15;
        drawGlow(pu.x, pu.y, 25 * pulse, pu.type.color, 0.2);
        X.fillStyle = pu.type.color;
        X.beginPath();
        X.arc(pu.x, pu.y, pu.r * pulse, 0, Math.PI * 2);
        X.fill();
        X.fillStyle = '#000';
        X.font = 'bold 8px JetBrains Mono';
        X.textAlign = 'center';
        X.textBaseline = 'middle';
        X.fillText(pu.type.label, pu.x, pu.y);
    }

    // Paddle
    const pw = paddle.w, ph = paddle.h;
    const px = paddle.x - pw / 2, py = paddle.y - ph / 2;
    drawGlow(paddle.x, paddle.y, pw * 0.6, '#ff3366', 0.15);
    const pgrd = X.createLinearGradient(px, py, px, py + ph);
    pgrd.addColorStop(0, '#ff3366');
    pgrd.addColorStop(1, '#cc1144');
    X.fillStyle = pgrd;
    X.beginPath();
    X.moveTo(px + 4, py);
    X.lineTo(px + pw - 4, py);
    X.quadraticCurveTo(px + pw, py, px + pw, py + 4);
    X.lineTo(px + pw, py + ph - 4);
    X.quadraticCurveTo(px + pw, py + ph, px + pw - 4, py + ph);
    X.lineTo(px + 4, py + ph);
    X.quadraticCurveTo(px, py + ph, px, py + ph - 4);
    X.lineTo(px, py + 4);
    X.quadraticCurveTo(px, py, px + 4, py);
    X.fill();

    // Balls
    for (const b of balls) {
        // Trail
        for (const t of b.trail) {
            if (t.life > 0) {
                X.globalAlpha = t.life * 0.3;
                X.fillStyle = b.fire ? '#ff6600' : b.color;
                X.beginPath();
                X.arc(t.x, t.y, b.r * t.life, 0, Math.PI * 2);
                X.fill();
            }
        }
        X.globalAlpha = 1;

        // Ball glow
        drawGlow(b.x, b.y, b.r * 4, b.fire ? '#ff6600' : '#fff', 0.25);

        // Ball body
        X.fillStyle = b.fire ? '#ff6600' : '#fff';
        X.beginPath();
        X.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        X.fill();

        if (b.fire) {
            X.fillStyle = '#ffdd00';
            X.beginPath();
            X.arc(b.x, b.y, b.r * 0.5, 0, Math.PI * 2);
            X.fill();
        }
    }

    // Sticky ball aim line
    if (stickyBall && balls.length > 0) {
        X.strokeStyle = 'rgba(255,255,255,0.2)';
        X.setLineDash([5, 5]);
        X.lineWidth = 1;
        X.beginPath();
        X.moveTo(balls[0].x, balls[0].y);
        X.lineTo(
            balls[0].x + Math.cos(launchAngle) * 80,
            balls[0].y + Math.sin(launchAngle) * 80
        );
        X.stroke();
        X.setLineDash([]);
    }

    // Floating texts
    for (const t of texts) {
        X.globalAlpha = t.life;
        X.fillStyle = t.color;
        X.font = `bold ${t.size}px JetBrains Mono`;
        X.textAlign = 'center';
        X.fillText(t.text, t.x, t.y);
    }
    X.globalAlpha = 1;

    // HUD
    drawHUD();

    // Level up screen
    if (state === 'levelup') drawLevelUp();
    if (state === 'gameover') drawGameOver();

    X.restore();
}

function drawHUD() {
    // Score
    X.fillStyle = 'rgba(255,255,255,0.7)';
    X.font = '12px JetBrains Mono';
    X.textAlign = 'left';
    X.fillText('SCORE ' + score, 15, 25);

    // Level
    X.textAlign = 'center';
    X.fillText('LV ' + level, W / 2, 25);

    // Combo
    if (combo > 1) {
        X.fillStyle = '#ffdd00';
        X.font = 'bold 14px JetBrains Mono';
        X.textAlign = 'right';
        X.fillText(combo + 'x', W - 15, 25);

        // Combo bar
        const barW = 60;
        const barH = 3;
        const bx = W - 15 - barW;
        const by = 30;
        X.fillStyle = 'rgba(255,255,255,0.1)';
        X.fillRect(bx, by, barW, barH);
        X.fillStyle = '#ffdd00';
        X.fillRect(bx, by, barW * (comboTimer / 90), barH);
    }

    // Lives
    X.textAlign = 'right';
    for (let i = 0; i < lives; i++) {
        X.fillStyle = '#ff3366';
        X.beginPath();
        const lx = W - 20 - i * 18;
        const ly = H - 25;
        // Heart shape
        X.arc(lx - 4, ly, 5, Math.PI, 0, false);
        X.arc(lx + 4, ly, 5, Math.PI, 0, false);
        X.lineTo(lx, ly + 10);
        X.closePath();
        X.fill();
    }
}

function drawMenu() {
    // Title
    const pulse = 1 + Math.sin(frameCount * 0.03) * 0.05;
    X.save();
    X.translate(W / 2, H * 0.3);
    X.scale(pulse, pulse);
    X.font = "bold 42px 'Press Start 2P'";
    X.textAlign = 'center';
    X.fillStyle = '#ff3366';
    X.fillText('SHATTER', 0, 0);

    // Glow
    X.shadowColor = '#ff3366';
    X.shadowBlur = 30;
    X.fillText('SHATTER', 0, 0);
    X.shadowBlur = 0;
    X.restore();

    // Subtitle
    X.fillStyle = 'rgba(255,255,255,0.5)';
    X.font = '12px JetBrains Mono';
    X.textAlign = 'center';
    X.fillText('Neon Brick Breaker', W / 2, H * 0.3 + 35);

    // Best
    if (bestScore > 0) {
        X.fillStyle = 'rgba(255,221,0,0.6)';
        X.fillText('BEST: ' + bestScore + '  |  LV ' + bestLevel, W / 2, H * 0.45);
    }

    // Start prompt
    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        X.fillStyle = '#fff';
        X.font = '14px JetBrains Mono';
        X.fillText('TAP TO START', W / 2, H * 0.55);
    }

    // Controls
    X.fillStyle = 'rgba(255,255,255,0.25)';
    X.font = '10px JetBrains Mono';
    X.fillText('Move: Mouse / Touch', W / 2, H * 0.7);
    X.fillText('Launch: Click / Tap', W / 2, H * 0.7 + 18);

    // Decorative particles
    if (frameCount % 3 === 0) {
        spawnParticles(
            Math.random() * W, Math.random() * H * 0.5,
            NEON[Math.floor(Math.random() * NEON.length)], 1, 1
        );
    }
    for (const p of particles) {
        X.globalAlpha = p.life * 0.5;
        X.fillStyle = p.color;
        X.beginPath();
        X.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        X.fill();
    }
    X.globalAlpha = 1;
    particles.forEach(p => { p.y -= 0.3; p.life -= 0.01; });
    for (let i = particles.length - 1; i >= 0; i--) {
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}

function drawLevelUp() {
    X.fillStyle = 'rgba(5,5,10,0.7)';
    X.fillRect(0, 0, W, H);

    X.fillStyle = '#00ff88';
    X.font = "bold 28px 'Press Start 2P'";
    X.textAlign = 'center';
    X.fillText('LEVEL ' + level, W / 2, H * 0.35);
    X.shadowColor = '#00ff88';
    X.shadowBlur = 20;
    X.fillText('LEVEL ' + level, W / 2, H * 0.35);
    X.shadowBlur = 0;

    X.fillStyle = '#fff';
    X.font = '16px JetBrains Mono';
    X.fillText('COMPLETE', W / 2, H * 0.35 + 35);

    // Stars
    const starY = H * 0.5;
    for (let i = 0; i < 3; i++) {
        const sx = W / 2 + (i - 1) * 40;
        X.fillStyle = i < starRating ? '#ffdd00' : 'rgba(255,255,255,0.15)';
        X.font = '28px serif';
        X.fillText('★', sx, starY);
    }

    // Score
    X.fillStyle = 'rgba(255,255,255,0.6)';
    X.font = '12px JetBrains Mono';
    X.fillText('Score: ' + score + '  |  Max Combo: ' + maxCombo, W / 2, H * 0.58);

    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        X.fillStyle = '#fff';
        X.font = '13px JetBrains Mono';
        X.fillText('TAP TO CONTINUE', W / 2, H * 0.68);
    }
}

function drawGameOver() {
    X.fillStyle = 'rgba(5,5,10,0.8)';
    X.fillRect(0, 0, W, H);

    X.fillStyle = '#ff3366';
    X.font = "bold 24px 'Press Start 2P'";
    X.textAlign = 'center';
    X.fillText('GAME OVER', W / 2, H * 0.35);
    X.shadowColor = '#ff3366';
    X.shadowBlur = 20;
    X.fillText('GAME OVER', W / 2, H * 0.35);
    X.shadowBlur = 0;

    X.fillStyle = '#fff';
    X.font = '14px JetBrains Mono';
    X.fillText('Score: ' + score, W / 2, H * 0.45);
    X.fillText('Level: ' + level, W / 2, H * 0.45 + 22);
    X.fillText('Max Combo: ' + maxCombo + 'x', W / 2, H * 0.45 + 44);

    if (score >= bestScore && score > 0) {
        X.fillStyle = '#ffdd00';
        X.fillText('★ NEW BEST! ★', W / 2, H * 0.45 + 72);
    }

    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        X.fillStyle = 'rgba(255,255,255,0.6)';
        X.font = '13px JetBrains Mono';
        X.fillText('TAP TO CONTINUE', W / 2, H * 0.7);
    }
}

// ======================== LOOP ========================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
